    5 : [
    { "q": "What is the primary definition of Digital Forensics?", "o": ["The process of fixing broken computer hardware", "The application of investigation and analysis techniques to gather and preserve evidence from a particular computing device", "The act of legally hacking into a network", "The development of new cryptographic algorithms"], "a": 1 },

    { "q": "Dead Forensics (or Post-mortem forensics) involves:", "o": ["Investigating deceased individuals", "Analyzing data from a system that has been powered off and a forensic image has been taken", "Using outdated software", "Failing an investigation"], "a": 1 },

let currentSet = [];
let currentIndex = 0;
let userScore = 0;

function initQuiz(type) {
    if (type === 'full') {
        currentSet = [].concat(...Object.values(mcqData));
        document.getElementById('unit-title').innerText = "Full Syllabus Exam";
    } else {
        currentSet = mcqData[type];
        document.getElementById('unit-title').innerText = "Unit " + type;
    }
    
    currentIndex = 0;
    userScore = 0;
    document.getElementById('menu-area').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    const data = currentSet[currentIndex];
    document.getElementById('q-text').innerText = (currentIndex + 1) + ". " + data.q;
    document.getElementById('q-count').innerText = `Question ${currentIndex + 1} of ${currentSet.length}`;
    document.getElementById('score-counter').innerText = `Score: ${userScore}`;
    document.getElementById('progress-bar').style.width = ((currentIndex) / currentSet.length * 100) + "%";

    const optionsGrid = document.getElementById('options-grid');
    optionsGrid.innerHTML = '';
    
    data.o.forEach((option, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.innerText = option;
        btn.onclick = () => selectOption(idx, data.a, btn);
        optionsGrid.appendChild(btn);
    });
    document.getElementById('next-btn').disabled = true;
}

function selectOption(idx, correctIdx, element) {
    const allOptions = document.querySelectorAll('.option');
    allOptions.forEach(opt => opt.classList.add('disabled'));

    if (idx === correctIdx) {
        element.classList.add('correct');
        userScore++;
    } else {
        element.classList.add('incorrect');
        allOptions[correctIdx].classList.add('correct');
    }
    document.getElementById('next-btn').disabled = false;
}

function loadNextQuestion() {
    currentIndex++;
    if (currentIndex < currentSet.length) {
        renderQuestion();
    } else {
        alert(`Exam Completed! Final Score: ${userScore} / ${currentSet.length}`);
        exitToMenu();
    }
}

function exitToMenu() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('menu-area').style.display = 'grid';
}
</script>
